name: Finish Bun documentation migration

on:
  push:
    branches: [fix/complete-bun-release-migration]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Replace stale npm instructions
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text()
          old = """```bash
git clone https://github.com/o1xhack/obsidian-sync-trakt.git
cd obsidian-sync-trakt
npm install
npm run build      # produces main.js
npm run lint
npm run test:i18n  # smoke tests
```"""
          new = """Requires Bun 1.3.14 or newer.

```bash
git clone https://github.com/o1xhack/obsidian-sync-trakt.git
cd obsidian-sync-trakt
bun ci
bun run build      # produces main.js
bun run lint
bun run test:i18n  # smoke tests
```"""
          if old not in text:
              raise SystemExit("Expected npm development block was not found")
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit documentation update
        run: |
          rm .github/workflows/finish-bun-docs.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: replace npm development commands"
          git push origin HEAD:fix/complete-bun-release-migration
