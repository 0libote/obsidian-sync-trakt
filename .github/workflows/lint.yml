name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Complete Bun documentation migration
        if: github.event_name == 'pull_request'
        shell: python
        run: |
          from pathlib import Path

          path = Path("README.md")
          content = path.read_text(encoding="utf-8")
          old = """npm install
          npm run build      # produces main.js
          npm run lint
          npm run test:i18n  # smoke tests"""
          new = """bun ci
          bun run build      # produces main.js
          bun run lint
          bun run test:i18n  # smoke tests"""
          if old not in content:
              raise SystemExit(0)
          path.write_text(content.replace(old, new, 1), encoding="utf-8")

      - name: Commit documentation update
        if: github.event_name == 'pull_request'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update source build commands for Bun"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Use Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun ci

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc -noEmit -skipLibCheck
