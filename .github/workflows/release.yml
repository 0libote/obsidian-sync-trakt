name: Release Obsidian plugin

# Triggers on any pushed tag, AND can be manually re-run from the Actions
# tab. Idempotent: if a Release already exists at the tag (typically
# because scripts/release.sh created it locally), this workflow exits
# early without re-uploading or overwriting assets.
# Bun is pinned to the same stable version declared by package.json.
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Use Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun ci

      - name: Resolve tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch — find the latest tag reachable from HEAD
            echo "name=$(git describe --tags --abbrev=0 || echo '')" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if release already exists
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.name }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "No tag resolved — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists (likely created locally) — skipping build + upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin
        if: steps.check.outputs.skip != 'true'
        run: |
          bun run lint
          bun run test:i18n
          bun run check:release-i18n
          bun run build

      - name: Create release
        if: steps.check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.name }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title="$RELEASE_TAG" \
            --draft \
            main.js manifest.json styles.css
